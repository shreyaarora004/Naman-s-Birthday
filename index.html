<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Naman 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    text-align: center;
}

/* Card */
.card {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 85%;
    max-width: 520px;
    margin: 100px auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Buttons */
button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    background: #ff6b81;
    color: white;
    cursor: pointer;
}

.hidden {
    display: none;
}

/* Surprise popup */
#surprise {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 30px;
    z-index: 999;
    animation: zoom 0.6s ease;
}

@keyframes zoom {
    from {transform: scale(0);}
    to {transform: scale(1);}
}

/* Confetti */
.confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background: red;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
    }
}

/* Shake */
.shake {
    animation: shake 0.3s;
}

@keyframes shake {
    0% { transform: translate(2px, 2px); }
    25% { transform: translate(-2px, -2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-2px, 2px); }
    100% { transform: translate(0); }
}

/* Image */
.photo {
    width: 100%;
    border-radius: 15px;
    margin-top: 15px;
}
</style>

</head>

<body>

<div class="card">
    <h2>Hey Naman 😏</h2>
    <p>I have something VERY important...</p>

```
<button onclick="start()">Click Me 👀</button>

<div id="step1" class="hidden">
    <p>Come for your…</p>
    <p><strong>COUNTING CLASSES 📚😂</strong></p>
    <button onclick="reveal()">Fine I'll come 🙄</button>
</div>

<div id="step2" class="hidden">
    <h3>🍣 Adrift Kaya ✨</h3>
    <p>Dress nice mister 😌</p>

    <img src="your-photo.jpg.jpeg" class="photo">

    <button onclick="party()">WAIT… WHAT? 😳</button>
</div>
```

</div>

<!-- SURPRISE SCREEN -->

<div id="surprise">
    <h1>🎉 SURPRISE NAMAN!!! 🎂</h1>
    <p>HAPPY BIRTHDAY JAANA 😭💖</p>
    <p>Now get ready, we're going out 😏</p>
</div>

<script>
function start() {
    document.getElementById("step1").style.display = "block";
}

function reveal() {
    document.getElementById("step2").style.display = "block";
}

function party() {
    document.getElementById("surprise").style.display = "flex";

    // Shake screen
    document.body.classList.add("shake");
    setTimeout(() => {
        document.body.classList.remove("shake");
    }, 500);

    // Confetti burst
    for (let i = 0; i < 80; i++) {
        let confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            ["#ff4757","#1e90ff","#2ed573","#ffa502","#eccc68"][Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
    }
}
</script>

</body>
</html>
